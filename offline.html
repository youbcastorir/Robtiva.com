<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل — كاتب الرباط</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #1a3a5c, #0d2238);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 48px 36px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 12px; }
    p  { color: rgba(255,255,255,0.8); line-height: 1.7; margin-bottom: 28px; }
    .btn-wa {
      display: inline-flex; align-items: center; gap: 10px;
      background: #25D366; color: white;
      padding: 14px 28px; border-radius: 10px;
      text-decoration: none; font-weight: 700;
      font-size: 1rem; margin-bottom: 12px; width: 100%;
      justify-content: center;
    }
    .btn-retry {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.15); color: white;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 12px 24px; border-radius: 10px;
      text-decoration: none; font-weight: 600; width: 100%;
      justify-content: center; cursor: pointer;
      font-family: inherit; font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📵</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو أنك غير متصل بالإنترنت حالياً. يمكنك التواصل معنا مباشرة عبر واتساب أو المحاولة مجدداً.</p>
    <a href="https://wa.me/212612605737?text=مرحبا، أريد الاستفسار عن خدماتكم" class="btn-wa">
      💬 واتساب: +212 612 605 737
    </a>
    <button class="btn-retry" onclick="window.location.reload()">
      🔄 إعادة المحاولة
    </button>
  </div>
</body>
</html>
