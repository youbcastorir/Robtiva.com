<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #1a3a5c 0%, #0d2238 50%, #c8971a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {

      padding: 52px 40px;

    }
    .err-code {
      font-size: 6rem; font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #F0C040, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p  { color: rgba(255,255,255,0.78); line-height: 1.7; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .btn-home {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: white; color: #1a3a5c;
      padding: 13px 24px; border-radius: 10px;
      text-decoration: none; font-weight: 700; font-size: 1rem;
    }
    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #25D366; color: white;
      padding: 13px 24px; border-radius: 10px;
      text-decoration: none; font-weight: 700; font-size: 1rem;
    }
    .countdown { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 20px; }

</head>
